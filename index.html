<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WorkMap - Iniciar Sesión</title>
  <style>
    /* Apple-like system font and strict black/white palette with glassmorphism */
    :root{
      --bg-white: #ffffff;
      --glass-bg: rgba(255,255,255,0.86);
      --glass-bg-strong: rgba(255,255,255,0.95);
      --text-black: #000000;
      --text-muted: rgba(0,0,0,0.6);
      --border: rgba(0,0,0,0.08);
      --shadow: 0 12px 30px rgba(0,0,0,0.12);
      --shadow-strong: 0 18px 48px rgba(0,0,0,0.16);
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:-apple-system,'SF Pro Text','SF Pro Display',BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
      background:var(--bg-white);
      color:var(--text-black);
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    }

    .container{width:100%;max-width:420px}

    .logo{text-align:center;margin-bottom:24px}
    .logo-image{width:410px;height:auto;display:inline-block;border-radius:12px;box-shadow:0 px rgba(0,0,0,0.08);transition:transform .28s ease}
    .logo-image:hover{transform:translateY(-4px) scale(1.02)}
    .logo p{color:var(--text-muted);font-size:15px;margin-top:8px}

    .auth-card{
      background:linear-gradient(180deg,rgba(255,255,255,0.94),var(--glass-bg));
      border:1px solid var(--border);border-radius:20px;padding:28px;box-shadow:var(--shadow);
      backdrop-filter:blur(14px) saturate(110%);-webkit-backdrop-filter:blur(14px) saturate(110%);
      transition:box-shadow .25s ease,transform .18s ease;
    }
    .auth-card:hover{box-shadow:var(--shadow-strong);transform:translateY(-4px)}

    .tabs{display:flex;gap:8px;margin-bottom:18px}
    .tab{flex:1;padding:10px 12px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;color:var(--text-black);background:rgba(255,255,255,0.6);border:1px solid transparent;transition:all .22s}
    .tab:hover{background:rgba(0,0,0,0.03)}
    .tab.active{background:var(--text-black);color:var(--bg-white);box-shadow:0 6px 18px rgba(0,0,0,0.08)}

    .form-section{display:none}.form-section.active{display:block;animation:fadeIn .36s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:13px;color:var(--text-black);margin-bottom:6px;font-weight:500}
    .form-group input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg-white);color:var(--text-black);font-size:15px;transition:box-shadow .18s,border-color .18s}
    .form-group input:focus{outline:none;border-color:rgba(0,0,0,0.18);box-shadow:0 6px 18px rgba(0,0,0,0.06)}

    .btn{width:100%;padding:14px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-primary{background:var(--text-black);color:var(--bg-white);box-shadow:0 8px 26px rgba(0,0,0,0.12)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:var(--shadow-strong)}
    .btn-danger{background:transparent;color:var(--text-black);border:1px solid var(--border);margin-top:10px}
    .btn:disabled{opacity:.6;cursor:not-allowed}

    .user-info{text-align:center;padding:20px 0}
    .user-info .avatar{width:68px;height:68px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.06);color:var(--text-black);font-size:28px;box-shadow:0 8px 20px rgba(0,0,0,0.06)}
    .user-info h3{font-size:16px;margin-top:12px;font-weight:600}
    .user-info p{color:var(--text-muted);font-size:13px;margin-top:6px}

    .alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
    .alert.show{display:block;animation:slideIn .32s ease}
    .alert-error{background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);color:var(--text-black)}
    .alert-success{background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.06);color:var(--text-black)}
    @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

    .footer{text-align:center;margin-top:18px;color:var(--text-muted);font-size:12px}

    .spinner{width:18px;height:18px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:480px){.container{padding:0 6px}.auth-card{padding:20px;border-radius:16px}.logo-image{width:72px}.logo p{font-size:14px}.tab{padding:9px 10px;font-size:13px}.form-group input{padding:12px;font-size:15px}.btn{padding:13px}}
    @media(max-width:360px){.logo-image{width:64px}.logo p{font-size:13px}.auth-card{padding:16px}}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="2.png" alt="WorkMap Logo" class="logo-image">
      <p>Encuentra y publica ofertas laborales</p>
    </div>

    <div class="auth-card">
      <div id="alert" class="alert"></div>

      <div id="loggedInSection" style="display: none;">
        <div class="user-info">
          <div class="avatar">👤</div>
          <h3 id="userEmail">usuario@email.com</h3>
          <p>Sesión iniciada correctamente</p>
          <button class="btn btn-primary" onclick="goToMap()">
            🗺️ Ir al Mapa
          </button>
          <button class="btn btn-danger" onclick="logout()">
            🚪 Cerrar Sesión
          </button>
        </div>
      </div>

      <div id="authSection">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('login')">Iniciar Sesión</button>
          <button class="tab" onclick="switchTab('register')">Registrarse</button>
        </div>

        <div id="loginForm" class="form-section active">
          <div class="form-group">
            <label for="loginEmail">Correo electrónico</label>
            <input type="email" id="loginEmail" placeholder="tu@email.com" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Contraseña</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
          </div>
          <button class="btn btn-primary" onclick="login()" id="loginBtn">
            🔑 Iniciar Sesión
          </button>
        </div>

        <div id="registerForm" class="form-section">
          <div class="form-group">
            <label for="registerEmail">Correo electrónico</label>
            <input type="email" id="registerEmail" placeholder="tu@email.com" required>
          </div>
          <div class="form-group">
            <label for="registerPassword">Contraseña</label>
            <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" required>
          </div>
          <div class="form-group">
            <label for="registerConfirm">Confirmar contraseña</label>
            <input type="password" id="registerConfirm" placeholder="Repite tu contraseña" required>
          </div>
          <button class="btn btn-primary" onclick="register()" id="registerBtn">
            ✨ Crear Cuenta
          </button>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>che por fin vas a agarrar la plata</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword, 
      signOut, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { 
      getDatabase, 
      ref, 
      set 
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAhz1XHoprhhrHyYfuAdIYGMJxm5UsDO-4",
      authDomain: "the-pic-c437e.firebaseapp.com",
      databaseURL: "https://the-pic-c437e-default-rtdb.firebaseio.com",
      projectId: "the-pic-c437e",
      storageBucket: "the-pic-c437e.appspot.com",
      messagingSenderId: "750954597180",
      appId: "1:750954597180:web:fc586d73d852ed5e17ec39"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('loggedInSection').style.display = 'block';
        document.getElementById('userEmail').textContent = user.email;
      } else {
        document.getElementById('authSection').style.display = 'block';
        document.getElementById('loggedInSection').style.display = 'none';
      }
    });

    window.switchTab = function(tab) {
      const tabs = document.querySelectorAll('.tab');
      const sections = document.querySelectorAll('.form-section');
      
      tabs.forEach(t => t.classList.remove('active'));
      sections.forEach(s => s.classList.remove('active'));
      
      if (tab === 'login') {
        tabs[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        tabs[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
    };

    function showAlert(message, type = 'error') {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert alert-${type} show`;
      setTimeout(() => alert.classList.remove('show'), 5000);
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Procesando...';
      } else {
        btn.disabled = false;
        if (btnId === 'loginBtn') {
          btn.innerHTML = '🔑 Iniciar Sesión';
        } else {
          btn.innerHTML = '✨ Crear Cuenta';
        }
      }
    }

    window.register = async function() {
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirm').value;

      if (!email || !password || !confirm) {
        showAlert('Por favor completa todos los campos');
        return;
      }

      if (password.length < 6) {
        showAlert('La contraseña debe tener al menos 6 caracteres');
        return;
      }

      if (password !== confirm) {
        showAlert('Las contraseñas no coinciden');
        return;
      }

      setLoading('registerBtn', true);

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Guardar en Realtime Database
        await set(ref(db, 'users/' + user.uid), {
          email: email,
          createdAt: Date.now()
        });

        showAlert('¡Cuenta creada exitosamente!', 'success');
        
        setTimeout(() => {
          window.location.href = 'mapa.html';
        }, 1000);

      } catch (error) {
        console.error('Error al registrar:', error);
        let message = 'Error al crear la cuenta';
        
        switch (error.code) {
          case 'auth/email-already-in-use':
            message = 'Este correo ya está registrado';
            break;
          case 'auth/invalid-email':
            message = 'Correo electrónico inválido';
            break;
          case 'auth/weak-password':
            message = 'La contraseña es demasiado débil';
            break;
        }
        
        showAlert(message);
      } finally {
        setLoading('registerBtn', false);
      }
    };

    window.login = async function() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showAlert('Por favor ingresa tu correo y contraseña');
        return;
      }

      setLoading('loginBtn', true);

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showAlert('¡Bienvenido de vuelta!', 'success');
        
        setTimeout(() => {
          window.location.href = 'mapa.html';
        }, 500);

      } catch (error) {
        console.error('Error al iniciar sesión:', error);
        let message = 'Error al iniciar sesión';
        
        switch (error.code) {
          case 'auth/user-not-found':
            message = 'No existe una cuenta con este correo';
            break;
          case 'auth/wrong-password':
            message = 'Contraseña incorrecta';
            break;
          case 'auth/invalid-email':
            message = 'Correo electrónico inválido';
            break;
          case 'auth/too-many-requests':
            message = 'Demasiados intentos. Intenta más tarde';
            break;
          case 'auth/invalid-credential':
            message = 'Correo o contraseña incorrectos';
            break;
        }
        
        showAlert(message);
      } finally {
        setLoading('loginBtn', false);
      }
    };

    window.logout = async function() {
      try {
        await signOut(auth);
        showAlert('Sesión cerrada correctamente', 'success');
      } catch (error) {
        showAlert('Error al cerrar sesión');
      }
    };

    window.goToMap = function() {
      window.location.href = 'mapa.html';
    };

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('loginPassword')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
      });
      document.getElementById('registerConfirm')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') register();
      });
    });
  </script>
</body>
</html>
