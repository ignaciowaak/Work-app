<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WorkMap - Iniciar Sesión</title>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --success: #238636;
      --success-hover: #2ea043;
      --danger: #da3633;
      --danger-hover: #f85149;
      --warning: #d29922;
      --border: #30363d;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .logo h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .logo p {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 4px;
    }

    .auth-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: var(--bg-tertiary);
      padding: 4px;
      border-radius: 10px;
    }

    .tab {
      flex: 1;
      padding: 10px 14px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .tab.active {
      background: var(--accent);
      color: white;
    }

    .tab:hover:not(.active) {
      color: var(--text-primary);
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 15px;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }

    .form-group input::placeholder {
      color: #6e7681;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--success);
      color: white;
    }

    .btn-primary:hover {
      background: var(--success-hover);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
      margin-top: 10px;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .user-info {
      text-align: center;
      padding: 20px;
    }

    .user-info .avatar {
      width: 64px;
      height: 64px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 14px;
    }

    .user-info h3 {
      font-size: 16px;
      margin-bottom: 4px;
      word-break: break-all;
    }

    .user-info p {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }

    .alert.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    .alert-error {
      background: rgba(218, 54, 51, 0.15);
      border: 1px solid var(--danger);
      color: #f85149;
    }

    .alert-success {
      background: rgba(35, 134, 54, 0.15);
      border: 1px solid var(--success);
      color: #3fb950;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: var(--text-secondary);
      font-size: 11px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive para móviles pequeños */
    @media (max-width: 360px) {
      .auth-card {
        padding: 18px;
      }
      
      .logo h1 {
        font-size: 20px;
      }
      
      .logo-icon {
        font-size: 40px;
      }
      
      .tab {
        padding: 8px 10px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">📍</div>
      <h1>WorkMap</h1>
      <p>Encuentra y publica ofertas laborales</p>
    </div>

    <div class="auth-card">
      <div id="alert" class="alert"></div>

      <div id="loggedInSection" style="display: none;">
        <div class="user-info">
          <div class="avatar">👤</div>
          <h3 id="userEmail">usuario@email.com</h3>
          <p>Sesión iniciada correctamente</p>
          <button class="btn btn-primary" onclick="goToMap()">
            🗺️ Ir al Mapa
          </button>
          <button class="btn btn-danger" onclick="logout()">
            🚪 Cerrar Sesión
          </button>
        </div>
      </div>

      <div id="authSection">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('login')">Iniciar Sesión</button>
          <button class="tab" onclick="switchTab('register')">Registrarse</button>
        </div>

        <div id="loginForm" class="form-section active">
          <div class="form-group">
            <label for="loginEmail">Correo electrónico</label>
            <input type="email" id="loginEmail" placeholder="tu@email.com" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Contraseña</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
          </div>
          <button class="btn btn-primary" onclick="login()" id="loginBtn">
            🔑 Iniciar Sesión
          </button>
        </div>

        <div id="registerForm" class="form-section">
          <div class="form-group">
            <label for="registerEmail">Correo electrónico</label>
            <input type="email" id="registerEmail" placeholder="tu@email.com" required>
          </div>
          <div class="form-group">
            <label for="registerPassword">Contraseña</label>
            <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" required>
          </div>
          <div class="form-group">
            <label for="registerConfirm">Confirmar contraseña</label>
            <input type="password" id="registerConfirm" placeholder="Repite tu contraseña" required>
          </div>
          <button class="btn btn-primary" onclick="register()" id="registerBtn">
            ✨ Crear Cuenta
          </button>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>Usa Firebase Realtime Database (Gratuito)</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword, 
      signOut, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { 
      getDatabase, 
      ref, 
      set 
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAhz1XHoprhhrHyYfuAdIYGMJxm5UsDO-4",
      authDomain: "the-pic-c437e.firebaseapp.com",
      databaseURL: "https://the-pic-c437e-default-rtdb.firebaseio.com",
      projectId: "the-pic-c437e",
      storageBucket: "the-pic-c437e.appspot.com",
      messagingSenderId: "750954597180",
      appId: "1:750954597180:web:fc586d73d852ed5e17ec39"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('loggedInSection').style.display = 'block';
        document.getElementById('userEmail').textContent = user.email;
      } else {
        document.getElementById('authSection').style.display = 'block';
        document.getElementById('loggedInSection').style.display = 'none';
      }
    });

    window.switchTab = function(tab) {
      const tabs = document.querySelectorAll('.tab');
      const sections = document.querySelectorAll('.form-section');
      
      tabs.forEach(t => t.classList.remove('active'));
      sections.forEach(s => s.classList.remove('active'));
      
      if (tab === 'login') {
        tabs[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        tabs[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
    };

    function showAlert(message, type = 'error') {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert alert-${type} show`;
      setTimeout(() => alert.classList.remove('show'), 5000);
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Procesando...';
      } else {
        btn.disabled = false;
        if (btnId === 'loginBtn') {
          btn.innerHTML = '🔑 Iniciar Sesión';
        } else {
          btn.innerHTML = '✨ Crear Cuenta';
        }
      }
    }

    window.register = async function() {
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirm').value;

      if (!email || !password || !confirm) {
        showAlert('Por favor completa todos los campos');
        return;
      }

      if (password.length < 6) {
        showAlert('La contraseña debe tener al menos 6 caracteres');
        return;
      }

      if (password !== confirm) {
        showAlert('Las contraseñas no coinciden');
        return;
      }

      setLoading('registerBtn', true);

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Guardar en Realtime Database
        await set(ref(db, 'users/' + user.uid), {
          email: email,
          createdAt: Date.now()
        });

        showAlert('¡Cuenta creada exitosamente!', 'success');
        
        setTimeout(() => {
          window.location.href = 'app.html';
        }, 1000);

      } catch (error) {
        console.error('Error al registrar:', error);
        let message = 'Error al crear la cuenta';
        
        switch (error.code) {
          case 'auth/email-already-in-use':
            message = 'Este correo ya está registrado';
            break;
          case 'auth/invalid-email':
            message = 'Correo electrónico inválido';
            break;
          case 'auth/weak-password':
            message = 'La contraseña es demasiado débil';
            break;
        }
        
        showAlert(message);
      } finally {
        setLoading('registerBtn', false);
      }
    };

    window.login = async function() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showAlert('Por favor ingresa tu correo y contraseña');
        return;
      }

      setLoading('loginBtn', true);

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showAlert('¡Bienvenido de vuelta!', 'success');
        
        setTimeout(() => {
          window.location.href = 'mapa.html';
        }, 500);

      } catch (error) {
        console.error('Error al iniciar sesión:', error);
        let message = 'Error al iniciar sesión';
        
        switch (error.code) {
          case 'auth/user-not-found':
            message = 'No existe una cuenta con este correo';
            break;
          case 'auth/wrong-password':
            message = 'Contraseña incorrecta';
            break;
          case 'auth/invalid-email':
            message = 'Correo electrónico inválido';
            break;
          case 'auth/too-many-requests':
            message = 'Demasiados intentos. Intenta más tarde';
            break;
          case 'auth/invalid-credential':
            message = 'Correo o contraseña incorrectos';
            break;
        }
        
        showAlert(message);
      } finally {
        setLoading('loginBtn', false);
      }
    };

    window.logout = async function() {
      try {
        await signOut(auth);
        showAlert('Sesión cerrada correctamente', 'success');
      } catch (error) {
        showAlert('Error al cerrar sesión');
      }
    };

    window.goToMap = function() {
      window.location.href = '#.html';
    };

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('loginPassword')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
      });
      document.getElementById('registerConfirm')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') register();
      });
    });
  </script>
</body>
</html>
